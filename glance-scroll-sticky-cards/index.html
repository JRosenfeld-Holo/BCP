<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Layered Flow | Glance</title>
        <link rel="stylesheet" href="/styles.css" />
    </head>
    <body>
        <section class="opening-section">
            <h1>Unfold Your Vision</h1>
        </section>

        <section class="layered-panels">
            <div class="panel-item" id="panel-1">
                <div class="panel-column">
                    <p>Subtle Dynamics</p>
                    <h1>Pattern Shift</h1>
                </div>
                <div class="panel-column">
                    <img src="/panel-asset-1.jpg" alt="Abstract geometric pattern shifting" />
                </div>
            </div>
            <div class="panel-item" id="panel-2">
                <div class="panel-column">
                    <p>Organic Forms</p>
                    <h1>Horizon Glide</h1>
                </div>
                <div class="panel-column">
                    <img src="/panel-asset-2.jpg" alt="Fluid, organic shapes blending into a horizon" />
                </div>
            </div>
            <div class="panel-item" id="panel-3">
                <div class="panel-column">
                    <p>Interconnected Logic</p>
                    <h1>System Weave</h1>
                </div>
                <div class="panel-column">
                    <img src="/panel-asset-3.jpg" alt="Complex network of lines and nodes" />
                </div>
            </div>
            <div class="panel-item" id="panel-4">
                <div class="panel-column">
                    <p>Iterative Motion</p>
                    <h1>Cycle Refine</h1>
                </div>
                <div class="panel-column">
                    <img src="/panel-asset-4.jpg" alt="Repetitive, refining circular motion" />
                </div>
            </div>
        </section>

        <section class="closing-section">
            <h1>Journey Concluded</h1>
        </section>
        <script type="module" src="/script.js"></script>
    </body>
</html>
